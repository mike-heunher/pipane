<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidepanel New Conversation Button — 10 Variants</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e0d8c8;
    padding: 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
  }

  h1 {
    width: 100%;
    text-align: center;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #888;
    margin-bottom: 8px;
  }

  .panel {
    width: 300px;
    height: 520px;
    background: #2a2520;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .variant-label {
    position: absolute;
    top: -24px;
    left: 0;
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .panel-wrapper {
    position: relative;
    padding-top: 28px;
  }

  /* Sessions list */
  .sessions {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .session {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.15s;
  }
  .session:hover { background: rgba(255,255,255,0.04); }

  .session-title {
    font-size: 13px;
    font-weight: 500;
    color: #e0d8c8;
    line-height: 1.35;
    margin-bottom: 4px;
  }

  .session-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #888;
  }

  .session-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #666;
    position: absolute;
    left: 8px;
    top: 18px;
  }

  .session { position: relative; padding-left: 22px; }

  .msg-count {
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
  }

  .show-more {
    padding: 12px 16px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
  }

  /* ===== HEADER STYLES (shared) ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #c4b89a;
  }

  /* =========================================================
     VARIANT STYLES
     ========================================================= */

  /* 1 — Pill button with gradient */
  .v1 .new-btn {
    background: linear-gradient(135deg, #c4b89a 0%, #a89060 100%);
    color: #1a1a1a;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(196,184,154,0.3);
  }
  .v1 .new-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(196,184,154,0.4);
  }
  .v1 .new-btn svg { width: 14px; height: 14px; }

  /* 2 — Ghost outline pill */
  .v2 .new-btn {
    background: transparent;
    color: #c4b89a;
    border: 1.5px solid rgba(196,184,154,0.4);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }
  .v2 .new-btn:hover {
    border-color: #c4b89a;
    background: rgba(196,184,154,0.08);
  }
  .v2 .new-btn svg { width: 14px; height: 14px; }

  /* 3 — FAB circle bottom-right */
  .v3 .fab {
    position: absolute;
    bottom: 20px;
    right: 16px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c4b89a, #a89060);
    border: none;
    color: #1a1a1a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 2px 8px rgba(196,184,154,0.3);
    transition: all 0.2s;
    z-index: 5;
  }
  .v3 .fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 2px 12px rgba(196,184,154,0.4);
  }
  .v3 .fab svg { width: 22px; height: 22px; }

  /* 4 — Full-width bottom bar */
  .v4 .bottom-bar {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .v4 .bottom-bar button {
    width: 100%;
    background: rgba(196,184,154,0.12);
    border: 1px solid rgba(196,184,154,0.2);
    color: #c4b89a;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .v4 .bottom-bar button:hover {
    background: rgba(196,184,154,0.18);
  }
  .v4 .bottom-bar button svg { width: 16px; height: 16px; }

  /* 5 — Minimal icon with tooltip feel */
  .v5 .new-btn {
    background: rgba(255,255,255,0.06);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    color: #c4b89a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .v5 .new-btn:hover {
    background: rgba(255,255,255,0.12);
  }
  .v5 .new-btn::after {
    content: 'New chat';
    position: absolute;
    right: calc(100% + 8px);
    background: #444;
    color: #e0d8c8;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .v5 .new-btn:hover::after { opacity: 1; }
  .v5 .new-btn svg { width: 18px; height: 18px; }

  /* 6 — Integrated into header as a "write" icon, warm tint */
  .v6 .header { background: rgba(196,184,154,0.04); }
  .v6 .new-btn {
    background: none;
    border: none;
    color: #c4b89a;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .v6 .new-btn:hover {
    background: rgba(196,184,154,0.15);
    color: #e0d8c8;
  }
  .v6 .new-btn svg { width: 20px; height: 20px; }

  /* 7 — Rounded rect with subtle left accent */
  .v7 .new-btn {
    background: rgba(196,184,154,0.08);
    border: none;
    border-left: 3px solid #c4b89a;
    color: #c4b89a;
    padding: 6px 12px;
    border-radius: 0 8px 8px 0;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .v7 .new-btn:hover {
    background: rgba(196,184,154,0.15);
  }
  .v7 .new-btn svg { width: 14px; height: 14px; }

  /* 8 — Top slot card */
  .v8 .new-card {
    margin: 10px 12px 4px;
    padding: 10px 14px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(196,184,154,0.12) 0%, rgba(196,184,154,0.04) 100%);
    border: 1px solid rgba(196,184,154,0.12);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .v8 .new-card:hover {
    background: linear-gradient(135deg, rgba(196,184,154,0.18) 0%, rgba(196,184,154,0.08) 100%);
  }
  .v8 .new-card .icon-wrap {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(196,184,154,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #c4b89a;
  }
  .v8 .new-card .icon-wrap svg { width: 16px; height: 16px; }
  .v8 .new-card .label {
    font-size: 13px;
    font-weight: 500;
    color: #c4b89a;
  }
  .v8 .new-card .sublabel {
    font-size: 11px;
    color: #888;
    margin-top: 1px;
  }

  /* 9 — Keyboard shortcut badge style */
  .v9 .new-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #c4b89a;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .v9 .new-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.15);
  }
  .v9 .new-btn svg { width: 14px; height: 14px; }
  .v9 .new-btn .kbd {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.08);
    padding: 2px 5px;
    border-radius: 3px;
    color: #999;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* 10 — Split header: title left, glass morphism button right */
  .v10 .new-btn {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e0d8c8;
    padding: 6px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.25s;
    font-family: inherit;
  }
  .v10 .new-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .v10 .new-btn svg { width: 14px; height: 14px; }

</style>
</head>
<body>

<h1>Sidepanel — New Conversation Button — 10 Variants</h1>

<script>
const sessions = [
  { title: "Polish button UX split commits backup data and clean leftover worktrees", time: "just now", msgs: 79 },
  { title: "Always show per-group and new conversation button", time: "4m ago", msgs: 12 },
  { title: "Sidepanel Conversation UX Compact Redesign and Dense Typography Fixes", time: "5m ago", msgs: 156 },
  { title: "Repeat sleep 100 command", time: "10m ago", msgs: 7 },
  { title: "Initial greeting and session kickoff", time: "11m ago", msgs: 2 },
];

function renderSessions(limit = 5) {
  return sessions.slice(0, limit).map(s => `
    <div class="session">
      <div class="session-dot"></div>
      <div class="session-title">${s.title}</div>
      <div class="session-meta">
        <span>${s.time}</span>
        <span class="msg-count">${s.msgs}</span>
      </div>
    </div>
  `).join('') + `<div class="show-more">▾ Show 175 more…</div>`;
}

const plusIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const editIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`;

const variants = [
  // 1 — Gradient pill
  { label: "1 · Gradient pill", cls: "v1", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${plusIcon} New</button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 2 — Ghost outline
  { label: "2 · Ghost outline pill", cls: "v2", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${plusIcon} New</button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 3 — FAB
  { label: "3 · Floating action button", cls: "v3", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
    </div>
    <div class="sessions">${renderSessions()}</div>
    <button class="fab">${plusIcon}</button>
  `},
  // 4 — Bottom bar
  { label: "4 · Full-width bottom bar", cls: "v4", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
    </div>
    <div class="sessions">${renderSessions()}</div>
    <div class="bottom-bar"><button>${editIcon} New conversation</button></div>
  `},
  // 5 — Minimal icon + tooltip
  { label: "5 · Minimal icon + tooltip", cls: "v5", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${editIcon}</button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 6 — Compose icon warm
  { label: "6 · Warm compose icon", cls: "v6", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${editIcon}</button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 7 — Left accent bar
  { label: "7 · Left accent bar", cls: "v7", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${plusIcon} New chat</button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 8 — Top slot card
  { label: "8 · Top slot card", cls: "v8", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
    </div>
    <div class="new-card">
      <div class="icon-wrap">${editIcon}</div>
      <div><div class="label">New conversation</div><div class="sublabel">Start a fresh session</div></div>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 9 — Kbd shortcut badge
  { label: "9 · Keyboard shortcut badge", cls: "v9", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${plusIcon} New <span class="kbd">⌘N</span></button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
  // 10 — Glass morphism
  { label: "10 · Glass morphism", cls: "v10", html: `
    <div class="header">
      <div class="header-title">PI-WEB</div>
      <button class="new-btn">${editIcon} New chat</button>
    </div>
    <div class="sessions">${renderSessions()}</div>
  `},
];

variants.forEach(v => {
  const wrapper = document.createElement('div');
  wrapper.className = 'panel-wrapper';
  wrapper.innerHTML = `<div class="variant-label">${v.label}</div><div class="panel ${v.cls}">${v.html}</div>`;
  document.body.appendChild(wrapper);
});
</script>

</body>
</html>
